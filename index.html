<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0"
    />
    <title>SmartSpend — Daily Expense Tracker</title>

    <!-- PWA: manifest + theming -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#4740db" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a12" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="SmartSpend — track daily expenses, understand spending habits, and hit your savings goals." />

    <!-- PWA: iOS / Safari standalone support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SmartSpend" />
    <link rel="apple-touch-icon" href="/icons/icon-512.png" />
    <link rel="icon" type="image/png" href="/icons/icon-512.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
